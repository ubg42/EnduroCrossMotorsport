<script>
    (function () {
        const audioState = {
            adOpen: false,
            hidden: false,
            blurred: false,
            muted: false
        };

        const audioContexts = new Set();

        function rememberContext(ctx) {
            if (ctx) audioContexts.add(ctx);
            return ctx;
        }

        function wrapAudioContext(name) {
            const Native = window[name];
            if (!Native || Native.__focusMuteWrapped) return;

            function Wrapped(...args) {
                const ctx = new Native(...args);
                rememberContext(ctx);
                return ctx;
            }

            Wrapped.prototype = Native.prototype;
            Object.setPrototypeOf(Wrapped, Native);
            Wrapped.__focusMuteWrapped = true;
            window[name] = Wrapped;
        }

        wrapAudioContext("AudioContext");
        wrapAudioContext("webkitAudioContext");

        function shouldMute() {
            return audioState.adOpen || audioState.hidden || audioState.blurred;
        }

        async function setUnityMute(mute) {
            if (audioState.muted === mute) return;
            audioState.muted = mute;

            try {
                document.querySelectorAll("audio, video").forEach(el => {
                    el.muted = mute;
                    el.volume = mute ? 0 : 1;
                });
            } catch (e) {}

            for (const ctx of audioContexts) {
                try {
                    if (mute) {
                        if (ctx.state === "running") {
                            await ctx.suspend();
                        }
                    } else {
                        // Возвращаем звук только если вкладка снова активна
                        if (ctx.state === "suspended") {
                            try { await ctx.resume(); } catch (e) {}
                        }
                    }
                } catch (e) {}
            }

            console.log("[AUDIO]", mute ? "muted" : "unmuted");
        }

        function refreshMute() {
            setUnityMute(shouldMute());
        }

        window.__muteForAd = function () {
            audioState.adOpen = true;
            refreshMute();
        };

        window.__unmuteAfterAd = function () {
            audioState.adOpen = false;
            refreshMute();
        };

        document.addEventListener("visibilitychange", function () {
            audioState.hidden = document.hidden;
            refreshMute();
        });

        window.addEventListener("blur", function () {
            audioState.blurred = true;
            refreshMute();
        });

        window.addEventListener("focus", function () {
            audioState.blurred = false;
            refreshMute();
        });

        setInterval(() => {
            try {
                document.querySelectorAll("audio, video").forEach(el => {
                    el.muted = shouldMute();
                    el.volume = shouldMute() ? 0 : 1;
                });
            } catch (e) {}
        }, 500);

        refreshMute();
    })();
    </script>
